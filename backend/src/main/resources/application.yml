# ======================================================================
# MỸ PHẨM BACKEND — Cấu hình chung
# Override bằng application-{profile}.yml hoặc biến môi trường.
# ======================================================================

spring:
  application:
    name: mypham-backend

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # PostgreSQL — chi tiết theo profile
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tracuu_maloi}
    username: ${DB_USERNAME:mypham}
    password: ${DB_PASSWORD:mypham123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update          # dev: auto add column khi entity thay đổi. Production nên đổi lại 'validate'.
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Asia/Ho_Chi_Minh
        format_sql: false

  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Ho_Chi_Minh
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /
  compression:
    enabled: true
  error:
    include-message: always
    include-binding-errors: always

# ----------------------------------------------------------------------
# Application-specific config
# ----------------------------------------------------------------------
app:
  jwt:
    # Secret phải ≥ 32 bytes cho HS256. Đây là giá trị DEV — PROD phải đổi!
    secret: ${JWT_SECRET:dGhpc19pc19hX3ZlcnlfbG9uZ19zZWNyZXRfa2V5X2Zvcl9kZXZlbG9wbWVudF9vbmx5Xzg0MjM=}
    access-token-expiration: 900000       # 15 phút
    refresh-token-expiration: 604800000   # 7 ngày
    issuer: mypham

  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001

  uploads:
    dir: ${UPLOADS_DIR:uploads}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# ----------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------
logging:
  level:
    root: INFO
    com.mypham: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n"
